name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.0.app
      
    - name: Build
      run: |
        xcodebuild -project Vimtico.xcodeproj \
          -scheme Vimtico \
          -configuration Release \
          -archivePath build/Vimtico.xcarchive \
          archive
          
    - name: Export App
      run: |
        xcodebuild -exportArchive \
          -archivePath build/Vimtico.xcarchive \
          -exportOptionsPlist ExportOptions.plist \
          -exportPath build/export
          
    - name: Create DMG
      run: |
        mkdir -p build/dmg
        cp -r build/export/Vimtico.app build/dmg/
        ln -s /Applications build/dmg/Applications
        hdiutil create -volname "Vimtico" \
          -srcfolder build/dmg \
          -ov -format UDZO \
          build/Vimtico.dmg
          
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Vimtico.dmg
        path: build/Vimtico.dmg
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: build/Vimtico.dmg
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
