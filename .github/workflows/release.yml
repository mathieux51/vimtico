name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Generate Version
      id: version
      run: |
        # Date-based version: YYYY.MM.DD.run_number
        DATE_PART=$(date +%Y.%-m.%-d)
        # Count commits today to handle multiple pushes
        TODAY_START=$(date +%Y-%m-%dT00:00:00)
        COMMIT_COUNT=$(git rev-list --count --since="$TODAY_START" HEAD)
        VERSION="${DATE_PART}.${COMMIT_COUNT}"
        echo "version=$VERSION" >> "$GITHUB_OUTPUT"
        echo "Generated version: $VERSION"

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_15.0.app

    - name: Update Version in Project
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        sed -i '' "s/MARKETING_VERSION = [^;]*/MARKETING_VERSION = $VERSION/" Vimtico.xcodeproj/project.pbxproj
        sed -i '' "s/CURRENT_PROJECT_VERSION = [^;]*/CURRENT_PROJECT_VERSION = 1/" Vimtico.xcodeproj/project.pbxproj

    - name: Build Archive
      run: |
        xcodebuild -project Vimtico.xcodeproj \
          -scheme Vimtico \
          -configuration Release \
          -archivePath build/Vimtico.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Create App from Archive
      run: |
        mkdir -p build/export
        cp -r build/Vimtico.xcarchive/Products/Applications/Vimtico.app build/export/

    - name: Create DMG
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        mkdir -p build/dmg
        cp -r build/export/Vimtico.app build/dmg/
        ln -s /Applications build/dmg/Applications
        hdiutil create -volname "Vimtico" \
          -srcfolder build/dmg \
          -ov -format UDZO \
          "build/Vimtico-${VERSION}.dmg"

    - name: Compute SHA256
      id: sha
      run: |
        VERSION="${{ steps.version.outputs.version }}"
        SHA=$(shasum -a 256 "build/Vimtico-${VERSION}.dmg" | awk '{print $1}')
        echo "sha256=$SHA" >> "$GITHUB_OUTPUT"
        echo "SHA256: $SHA"

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Vimtico-${{ steps.version.outputs.version }}.dmg
        path: build/Vimtico-${{ steps.version.outputs.version }}.dmg

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: v${{ steps.version.outputs.version }}
        name: v${{ steps.version.outputs.version }}
        files: build/Vimtico-${{ steps.version.outputs.version }}.dmg
        generate_release_notes: true
        make_latest: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Update Homebrew Tap
      env:
        TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
      run: |
        if [ -z "${TAP_TOKEN}" ]; then
          echo "TAP_TOKEN secret not configured, skipping Homebrew tap update"
          exit 0
        fi

        VERSION="${{ steps.version.outputs.version }}"
        SHA="${{ steps.sha.outputs.sha256 }}"

        # Clone the homebrew-tap repo
        git clone "https://x-access-token:${TAP_TOKEN}@github.com/mathieux51/homebrew-tap.git" /tmp/homebrew-tap

        # Write updated cask formula
        printf '%s\n' \
          'cask "vimtico" do' \
          "  version \"${VERSION}\"" \
          "  sha256 \"${SHA}\"" \
          '' \
          '  url "https://github.com/mathieux51/vimtico/releases/download/v#{version}/Vimtico-#{version}.dmg"' \
          '  name "Vimtico"' \
          '  desc "Native macOS PostgreSQL client with Vim mode and Nord theme"' \
          '  homepage "https://github.com/mathieux51/vimtico"' \
          '' \
          '  livecheck do' \
          '    url :url' \
          '    strategy :github_latest' \
          '  end' \
          '' \
          '  depends_on macos: ">= :sonoma"' \
          '' \
          '  app "Vimtico.app"' \
          '' \
          '  zap trash: [' \
          '    "~/.config/vimtico",' \
          '    "~/Library/Preferences/com.mathieux51.Vimtico.plist",' \
          '    "~/Library/Application Support/Vimtico",' \
          '  ]' \
          'end' \
          > /tmp/homebrew-tap/Casks/vimtico.rb

        # Commit and push
        cd /tmp/homebrew-tap
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git add Casks/vimtico.rb
        git commit -m "Update vimtico to ${VERSION}" || echo "No changes to commit"
        git push
